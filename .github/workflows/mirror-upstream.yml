name: Mirror upstream to fork

on:
  workflow_dispatch:
  schedule:
    - cron: "17 0 */3 * *"

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Mirror upstream repositories to forks
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          # Add more token mappings here when .github/mirror-repositories.json uses
          # different token_env values, for example:
          # GH_PAT_PROJECT_A: ${{ secrets.GH_PAT_PROJECT_A }}
        run: python scripts/mirror_repositories.py --config .github/mirror-repositories.json
